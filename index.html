<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>NEON PROTOCOL</title>
<style>
  :root {
    --neon-cyan: #00f0ff;
    --neon-magenta: #ff2fd6;
    --neon-yellow: #ffe94a;
    --neon-green: #4aff8f;
    --neon-red: #ff3b5c;
    --bg: #05060e;
    --panel: rgba(8, 12, 28, 0.92);
    --panel-border: rgba(0, 240, 255, 0.35);
    --text: #d8f4ff;
    --text-dim: #6d8aa5;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; -webkit-tap-highlight-color: transparent; }
  html, body { touch-action: none; overscroll-behavior: none; }
  #game-canvas { touch-action: none; }
  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Segoe UI', 'Malgun Gothic', sans-serif;
    color: var(--text);
  }
  #game-canvas {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    display: block;
    cursor: crosshair;
  }
  /* ---------- shared UI ---------- */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    background: radial-gradient(ellipse at center, rgba(5,6,14,0.55) 0%, rgba(5,6,14,0.88) 100%);
  }
  .screen.hidden { display: none; }
  .mono { font-family: 'Consolas', 'Courier New', monospace; }
  h1.logo {
    font-family: 'Consolas', monospace;
    font-size: clamp(38px, 7vw, 84px);
    letter-spacing: 0.22em;
    font-weight: 700;
    color: #fff;
    text-shadow:
      0 0 8px var(--neon-cyan),
      0 0 24px var(--neon-cyan),
      0 0 64px rgba(0,240,255,0.6);
    margin-bottom: 6px;
  }
  h1.logo .accent {
    color: var(--neon-magenta);
    text-shadow:
      0 0 8px var(--neon-magenta),
      0 0 24px var(--neon-magenta),
      0 0 64px rgba(255,47,214,0.6);
  }
  .tagline {
    font-family: 'Consolas', monospace;
    color: var(--text-dim);
    letter-spacing: 0.35em;
    font-size: clamp(10px, 1.4vw, 14px);
    margin-bottom: 44px;
    text-transform: uppercase;
  }
  .btn {
    font-family: 'Consolas', monospace;
    display: block;
    min-width: 300px;
    padding: 13px 28px;
    margin: 7px auto;
    background: linear-gradient(180deg, rgba(0,240,255,0.09) 0%, rgba(0,240,255,0.02) 55%, rgba(0,240,255,0.07) 100%);
    border: 1px solid var(--panel-border);
    border-left: 3px solid rgba(0,240,255,0.5);
    clip-path: polygon(0 0, calc(100% - 14px) 0, 100% 14px, 100% 100%, 14px 100%, 0 calc(100% - 14px));
    color: var(--text);
    font-size: 16px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.12s ease;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .btn::after {
    content: '';
    position: absolute; top: 0; left: -80%;
    width: 50%; height: 100%;
    background: linear-gradient(100deg, transparent, rgba(0,240,255,0.18), transparent);
    transform: skewX(-20deg);
    transition: left 0.35s ease;
    pointer-events: none;
  }
  .btn:hover::after, .btn.focused::after { left: 130%; }
  .btn:hover, .btn.focused {
    background: linear-gradient(180deg, rgba(0,240,255,0.18) 0%, rgba(0,240,255,0.06) 55%, rgba(0,240,255,0.14) 100%);
    border-color: var(--neon-cyan);
    border-left-color: var(--neon-cyan);
    color: #fff;
    box-shadow: 0 0 22px rgba(0, 240, 255, 0.4), inset 0 0 14px rgba(0, 240, 255, 0.1);
    text-shadow: 0 0 8px var(--neon-cyan);
  }
  .btn:active { transform: scale(0.98); }
  .btn.danger { border-color: rgba(255,59,92,0.4); border-left-color: rgba(255,59,92,0.55); }
  .btn.danger:hover { border-color: var(--neon-red); box-shadow: 0 0 18px rgba(255,59,92,0.35); text-shadow: 0 0 8px var(--neon-red); }
  .btn.small { min-width: 180px; padding: 9px 18px; font-size: 13px; }
  .btn:disabled { opacity: 0.35; cursor: default; pointer-events: none; }
  .panel {
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.016) 0 1px, transparent 1px 3px),
      linear-gradient(165deg, rgba(14,22,44,0.97) 0%, rgba(7,10,24,0.97) 45%, rgba(10,14,32,0.97) 100%);
    border: 1px solid var(--panel-border);
    border-top: 2px solid rgba(0,240,255,0.55);
    clip-path: polygon(0 0, calc(100% - 22px) 0, 100% 22px, 100% 100%, 22px 100%, 0 calc(100% - 22px));
    box-shadow: 0 0 48px rgba(0, 240, 255, 0.14), inset 0 0 60px rgba(0, 20, 40, 0.5);
    padding: 30px 36px;
    max-width: min(860px, 92vw);
    max-height: 86vh;
    overflow-y: auto;
    position: relative;
  }
  .panel::before {
    content: '';
    position: absolute; top: 6px; left: 6px; right: 28px;
    height: 1px;
    background: linear-gradient(90deg, rgba(0,240,255,0.55), transparent 70%);
    pointer-events: none;
  }
  #scanlines {
    position: absolute; inset: 0; z-index: 7; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0.08) 0 1px, transparent 1px 4px);
    opacity: 0.5;
  }
  @keyframes cardIn {
    from { opacity: 0; transform: translateY(18px) scale(0.96); }
    to { opacity: 1; transform: translateY(0) scale(1); }
  }
  .card-row .card { animation: cardIn 0.4s cubic-bezier(0.2, 0.9, 0.3, 1.2) backwards; }
  .card-row .card:nth-child(1) { animation-delay: 0.05s; }
  .card-row .card:nth-child(2) { animation-delay: 0.15s; }
  .card-row .card:nth-child(3) { animation-delay: 0.25s; }
  .panel h2 {
    font-family: 'Consolas', monospace;
    letter-spacing: 0.25em;
    font-size: 20px;
    color: var(--neon-cyan);
    text-shadow: 0 0 10px rgba(0,240,255,0.6);
    margin-bottom: 18px;
    text-transform: uppercase;
    text-align: center;
  }
  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: rgba(0,240,255,0.04); }
  ::-webkit-scrollbar-thumb { background: rgba(0,240,255,0.3); }
  /* ---------- HUD ---------- */
  #hud {
    position: absolute; inset: 0;
    z-index: 5; pointer-events: none;
    font-family: 'Consolas', monospace;
  }
  #hud.hidden { display: none; }
  .hud-tl { position: absolute; top: calc(16px + env(safe-area-inset-top)); left: calc(18px + env(safe-area-inset-left)); width: 280px; }
  .bar-wrap { margin-bottom: 6px; }
  .bar-label { font-size: 10px; letter-spacing: 0.2em; color: var(--text-dim); margin-bottom: 2px; }
  .bar {
    height: 12px; width: 100%;
    background: linear-gradient(180deg, rgba(0,0,0,0.5), rgba(255,255,255,0.05));
    border: 1px solid rgba(255,255,255,0.18);
    position: relative;
    clip-path: polygon(0 0, calc(100% - 6px) 0, 100% 100%, 0 100%);
    overflow: hidden;
  }
  .bar::after {
    /* segment ticks over the fill */
    content: '';
    position: absolute; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(90deg, transparent 0 23px, rgba(0,0,0,0.45) 23px 25px);
  }
  .bar-fill { position: absolute; inset: 0; z-index: 2; transform-origin: left; transition: transform 0.1s linear; }
  .bar-ghost {
    /* trailing white bar that shows damage just taken */
    position: absolute; inset: 0; z-index: 1; transform-origin: left;
    background: rgba(255,255,255,0.55);
    transition: transform 0.55s ease 0.15s;
  }
  .bar-value {
    position: absolute; right: 8px; top: -1px; z-index: 4;
    font-size: 9px; color: rgba(255,255,255,0.9); letter-spacing: 0.05em;
    text-shadow: 0 1px 2px #000;
  }
  #bar-shield .bar-fill { background: linear-gradient(90deg, #0090ff, var(--neon-cyan)); box-shadow: 0 0 10px rgba(0,240,255,0.7); }
  #bar-hp .bar-fill { background: linear-gradient(90deg, #c4003f, var(--neon-red)); box-shadow: 0 0 10px rgba(255,59,92,0.7); }
  #bar-xp { height: 6px; }
  #bar-xp .bar-fill { background: linear-gradient(90deg, #8f00ff, var(--neon-magenta)); box-shadow: 0 0 8px rgba(255,47,214,0.7); }
  #dash-pips { display: flex; gap: 5px; margin-top: 7px; }
  .pip {
    width: 26px; height: 8px;
    border: 1px solid rgba(0,240,255,0.5);
    background: rgba(0,240,255,0.05);
    transform: skewX(-20deg);
  }
  .pip.full { background: var(--neon-cyan); box-shadow: 0 0 10px var(--neon-cyan); }
  .pip.charging { background: rgba(0,240,255,0.25); }
  .hud-tr { position: absolute; top: calc(16px + env(safe-area-inset-top)); right: calc(18px + env(safe-area-inset-right)); text-align: right; }
  .hud-tr .sector-name {
    font-size: 15px; letter-spacing: 0.25em; color: #fff;
    text-shadow: 0 0 10px var(--neon-cyan);
  }
  .hud-tr .wave-info { font-size: 12px; color: var(--text-dim); letter-spacing: 0.15em; margin-top: 4px; }
  .hud-tr .credits { font-size: 13px; color: var(--neon-yellow); text-shadow: 0 0 8px rgba(255,233,74,0.6); margin-top: 6px; }
  .hud-bc {
    position: absolute; bottom: calc(14px + env(safe-area-inset-bottom)); left: 50%; transform: translateX(-50%);
    text-align: center; font-size: 11px; color: var(--text-dim); letter-spacing: 0.2em;
  }
  #boss-bar-wrap {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%);
    width: min(560px, 70vw); display: none;
  }
  #boss-bar-wrap.visible { display: block; }
  #boss-name {
    text-align: center; font-size: 13px; letter-spacing: 0.3em;
    color: var(--neon-red); text-shadow: 0 0 10px rgba(255,59,92,0.8);
    margin-bottom: 4px;
  }
  #boss-bar { height: 12px; border-color: rgba(255,59,92,0.5); }
  #boss-bar .bar-fill { background: linear-gradient(90deg, #7a0022, var(--neon-red)); box-shadow: 0 0 14px rgba(255,59,92,0.8); }
  #level-num { color: var(--neon-magenta); font-size: 11px; letter-spacing: 0.2em; margin-top: 3px; }
  #combo-display {
    position: absolute; right: 18px; top: 110px; text-align: right;
    font-size: 22px; color: var(--neon-yellow);
    text-shadow: 0 0 12px rgba(255,233,74,0.8);
    opacity: 0; transition: opacity 0.2s;
  }
  #combo-display.visible { opacity: 1; }
  #announce {
    position: absolute; top: 34%; left: 50%; transform: translate(-50%, -50%);
    font-family: 'Consolas', monospace;
    font-size: clamp(24px, 4vw, 44px); letter-spacing: 0.35em;
    color: #fff; text-shadow: 0 0 20px var(--neon-cyan), 0 0 60px rgba(0,240,255,0.5);
    opacity: 0; pointer-events: none; text-align: center; white-space: nowrap;
  }
  /* ---------- cards (upgrades / path) ---------- */
  .card-row { display: flex; gap: 18px; justify-content: center; flex-wrap: wrap; }
  .card {
    width: 218px; min-height: 240px;
    background:
      repeating-linear-gradient(0deg, rgba(255,255,255,0.015) 0 1px, transparent 1px 3px),
      linear-gradient(160deg, rgba(13,20,42,0.96) 0%, rgba(7,10,24,0.96) 60%, rgba(11,16,34,0.96) 100%);
    border: 1px solid var(--panel-border);
    border-top: 2px solid rgba(0,240,255,0.45);
    clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 0 100%);
    padding: 18px 16px;
    cursor: pointer;
    transition: all 0.14s ease;
    display: flex; flex-direction: column;
    position: relative;
    font-family: 'Consolas', monospace;
  }
  .card:hover, .card.focused {
    transform: translateY(-6px) scale(1.02);
    box-shadow: 0 8px 34px rgba(0,240,255,0.3);
    border-color: var(--neon-cyan);
  }
  .card .icon {
    background: radial-gradient(circle, rgba(0,240,255,0.12) 0%, transparent 70%);
    border-radius: 50%;
  }
  .card .rarity { font-size: 9px; letter-spacing: 0.3em; margin-bottom: 8px; text-transform: uppercase; }
  .card.r-common .rarity { color: var(--text-dim); }
  .card.r-rare { border-color: rgba(0,240,255,0.55); }
  .card.r-rare .rarity { color: var(--neon-cyan); text-shadow: 0 0 6px var(--neon-cyan); }
  .card.r-epic { border-color: rgba(255,47,214,0.6); }
  .card.r-epic:hover { border-color: var(--neon-magenta); box-shadow: 0 0 30px rgba(255,47,214,0.35); }
  .card.r-epic .rarity { color: var(--neon-magenta); text-shadow: 0 0 6px var(--neon-magenta); }
  .card .icon { font-size: 34px; text-align: center; margin: 8px 0 12px; filter: drop-shadow(0 0 8px rgba(0,240,255,0.7)); }
  .card .name { font-size: 14px; letter-spacing: 0.08em; color: #fff; margin-bottom: 8px; text-align: center; min-height: 34px; }
  .card .desc { font-size: 11.5px; line-height: 1.5; color: var(--text-dim); text-align: center; flex: 1; }
  .card .stacks { font-size: 10px; color: var(--neon-yellow); text-align: center; margin-top: 8px; letter-spacing: 0.15em; }
  /* ---------- meta / settings rows ---------- */
  .meta-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(230px, 1fr)); gap: 12px; }
  .meta-node {
    border: 1px solid var(--panel-border);
    padding: 13px 15px;
    font-family: 'Consolas', monospace;
    cursor: pointer;
    transition: all 0.12s;
    background: rgba(0,240,255,0.03);
  }
  .meta-node:hover { border-color: var(--neon-cyan); background: rgba(0,240,255,0.1); }
  .meta-node.maxed { border-color: rgba(255,233,74,0.5); cursor: default; }
  .meta-node.locked { opacity: 0.45; cursor: default; }
  .meta-node .mn-name { font-size: 13px; color: #fff; margin-bottom: 5px; letter-spacing: 0.06em; }
  .meta-node .mn-desc { font-size: 11px; color: var(--text-dim); line-height: 1.45; margin-bottom: 7px; }
  .meta-node .mn-cost { font-size: 11px; color: var(--neon-yellow); letter-spacing: 0.1em; }
  .meta-node .mn-level { float: right; color: var(--neon-cyan); font-size: 11px; }
  .settings-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 4px; border-bottom: 1px solid rgba(0,240,255,0.1);
    font-family: 'Consolas', monospace; font-size: 14px;
    min-width: min(480px, 80vw);
  }
  .settings-row label { color: var(--text); letter-spacing: 0.08em; }
  input[type="range"] {
    -webkit-appearance: none; width: 180px; height: 4px;
    background: rgba(0,240,255,0.2); outline: none;
  }
  input[type="range"]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 14px; height: 14px;
    background: var(--neon-cyan); cursor: pointer;
    box-shadow: 0 0 8px var(--neon-cyan);
  }
  select {
    background: var(--panel); color: var(--text);
    border: 1px solid var(--panel-border); padding: 5px 10px;
    font-family: 'Consolas', monospace; outline: none;
  }
  .toggle-btn {
    min-width: 74px; padding: 5px 12px;
    background: rgba(0,240,255,0.05); border: 1px solid var(--panel-border);
    color: var(--text); cursor: pointer; font-family: 'Consolas', monospace;
    letter-spacing: 0.1em;
  }
  .toggle-btn.on { background: rgba(0,240,255,0.2); color: #fff; border-color: var(--neon-cyan); }
  /* ---------- stats table ---------- */
  .stats-table { font-family: 'Consolas', monospace; font-size: 14px; min-width: min(420px, 80vw); margin: 0 auto 20px; }
  .stats-table .srow { display: flex; justify-content: space-between; padding: 6px 4px; border-bottom: 1px solid rgba(0,240,255,0.08); }
  .stats-table .srow .k { color: var(--text-dim); letter-spacing: 0.08em; }
  .stats-table .srow .v { color: #fff; }
  .big-result {
    font-family: 'Consolas', monospace;
    font-size: clamp(30px, 5vw, 56px); letter-spacing: 0.3em;
    margin-bottom: 24px; text-align: center;
  }
  .big-result.defeat { color: var(--neon-red); text-shadow: 0 0 16px rgba(255,59,92,0.8), 0 0 50px rgba(255,59,92,0.4); }
  .big-result.victory { color: var(--neon-green); text-shadow: 0 0 16px rgba(74,255,143,0.8), 0 0 50px rgba(74,255,143,0.4); }
  .unlock-banner {
    font-family: 'Consolas', monospace; text-align: center;
    color: var(--neon-yellow); text-shadow: 0 0 10px rgba(255,233,74,0.7);
    font-size: 13px; letter-spacing: 0.12em; margin: 4px 0 14px;
  }
  .hint { font-family: 'Consolas', monospace; font-size: 11px; color: var(--text-dim); letter-spacing: 0.15em; margin-top: 20px; text-align: center; }
  .cores-row { display: flex; gap: 14px; justify-content: center; flex-wrap: wrap; margin-bottom: 8px; }
  .core-card {
    width: 190px; padding: 16px 14px;
    border: 1px solid var(--panel-border); background: rgba(0,240,255,0.03);
    cursor: pointer; font-family: 'Consolas', monospace; text-align: center;
    transition: all 0.13s;
  }
  .core-card:hover:not(.locked) { border-color: var(--neon-cyan); box-shadow: 0 0 20px rgba(0,240,255,0.25); transform: translateY(-4px); }
  .core-card.selected { border-color: var(--neon-green); box-shadow: 0 0 20px rgba(74,255,143,0.3); }
  .core-card.locked { opacity: 0.4; cursor: default; }
  .core-card .cc-icon { font-size: 30px; margin-bottom: 8px; }
  .core-card .cc-name { font-size: 13px; color: #fff; letter-spacing: 0.1em; margin-bottom: 6px; }
  .core-card .cc-desc { font-size: 10.5px; color: var(--text-dim); line-height: 1.45; min-height: 60px; }
  .core-card .cc-lock { font-size: 10px; color: var(--neon-yellow); margin-top: 6px; letter-spacing: 0.05em; }
  #vignette {
    position: absolute; inset: 0; z-index: 4; pointer-events: none;
    box-shadow: inset 0 0 180px rgba(0,0,0,0.75);
  }
  #damage-flash {
    position: absolute; inset: 0; z-index: 6; pointer-events: none;
    background: radial-gradient(ellipse at center, transparent 40%, rgba(255,30,70,0.35) 100%);
    opacity: 0; transition: opacity 0.25s;
  }

  /* ---------- mobile / notch handling ---------- */
  /* keep menu panels clear of notches and the home indicator on every device */
  .screen {
    padding:
      env(safe-area-inset-top)
      env(safe-area-inset-right)
      env(safe-area-inset-bottom)
      env(safe-area-inset-left);
  }
  /* phones & small viewports: stop fixed widths from overflowing the screen */
  @media (max-width: 560px), (pointer: coarse) and (max-width: 820px) {
    .btn { min-width: min(300px, 82vw); font-size: 15px; padding: 12px 18px; letter-spacing: 0.12em; }
    .btn.small { min-width: min(180px, 60vw); }
    .panel { padding: 22px 18px; max-width: 94vw; max-height: 88vh; }
    .tagline { margin-bottom: 30px; }
    /* lobby room code: shrink so long codes never clip off-screen */
    .panel .mono[style*="44px"] { font-size: 34px !important; letter-spacing: 0.2em !important; }
    /* upgrade / path cards: fit two-up and stay tappable */
    .card-row { gap: 10px; }
    .card { width: min(150px, 42vw); min-height: 150px; padding: 12px 10px; }
    .card .icon { font-size: 28px; margin: 4px 0 8px; }
    .card .name { font-size: 12px; min-height: 30px; }
    .card .desc { font-size: 10.5px; line-height: 1.4; }
    .stats-table { font-size: 12px; min-width: min(420px, 88vw); }
    /* slimmer HUD so the left stick area stays uncovered */
    .hud-tl { width: min(240px, 62vw); }
    .hud-tr .sector-name { font-size: 13px; }
  }
</style>
</head>
<body>
  <canvas id="game-canvas"></canvas>
  <div id="scanlines"></div>
  <div id="vignette"></div>
  <div id="damage-flash"></div>

  <!-- HUD -->
  <div id="hud" class="hidden">
    <div class="hud-tl">
      <div class="bar-wrap">
        <div class="bar-label" data-i18n="hud.shield">SHIELD</div>
        <div class="bar" id="bar-shield"><div class="bar-ghost"></div><div class="bar-fill"></div><span class="bar-value"></span></div>
      </div>
      <div class="bar-wrap">
        <div class="bar-label" data-i18n="hud.integrity">INTEGRITY</div>
        <div class="bar" id="bar-hp"><div class="bar-ghost"></div><div class="bar-fill"></div><span class="bar-value"></span></div>
      </div>
      <div class="bar-wrap">
        <div class="bar" id="bar-xp"><div class="bar-fill"></div></div>
        <div id="level-num">LV 1</div>
      </div>
      <div id="dash-pips"></div>
    </div>
    <div class="hud-tr">
      <div class="sector-name" id="hud-sector">SECTOR 01</div>
      <div class="wave-info" id="hud-wave">WAVE 1/3</div>
      <div class="credits" id="hud-credits">⬡ 0</div>
    </div>
    <div id="boss-bar-wrap">
      <div id="boss-name">BOSS</div>
      <div class="bar" id="boss-bar"><div class="bar-fill"></div></div>
    </div>
    <div id="combo-display">x1</div>
    <div class="hud-bc" id="hud-hint"></div>
    <div id="announce"></div>
  </div>
